name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-ios-ipa:
    name: Build unsigned IPA for sideloading
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate iOS platform files
        run: flutter create . --platforms=ios --project-name facai --org com.guoyaojun

      - name: Remove generated template tests
        run: rm -f test/widget_test.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        id: flutter_tests
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test --reporter expanded 2>&1 | tee flutter-test.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-log
          path: flutter-test.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Summarize test failure
        if: steps.flutter_tests.outcome == 'failure'
        run: |
          echo "::warning title=Flutter tests failed::Tests failed, but IPA packaging will continue. Download flutter-test-log for details."
          echo "::group::Flutter test log tail"
          tail -80 flutter-test.log
          echo "::endgroup::"
          {
            echo "### Flutter test failure"
            echo
            echo '```text'
            tail -80 flutter-test.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build iOS app without signing
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign 2>&1 | tee flutter-ios-build.log

      - name: Upload iOS build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-build-log
          path: flutter-ios-build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Summarize iOS build failure
        if: failure()
        run: |
          while IFS= read -r line; do
            line="${line//'%'/'%25'}"
            line="${line//$'\n'/'%0A'}"
            line="${line//$'\r'/'%0D'}"
            echo "::error title=iOS build log::$line"
          done < <(tail -80 flutter-ios-build.log)
          echo "::group::Flutter iOS build log tail"
          tail -120 flutter-ios-build.log
          echo "::endgroup::"
          {
            echo "### Flutter iOS build failure"
            echo
            echo '```text'
            tail -120 flutter-ios-build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa_unsigned/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa_unsigned/Payload/
          cd build/ios/ipa_unsigned
          zip -qry Facai.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Facai-unsigned-ipa
          path: build/ios/ipa_unsigned/Facai.ipa
          if-no-files-found: error
          retention-days: 14
