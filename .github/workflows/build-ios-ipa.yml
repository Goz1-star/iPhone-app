name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'dist/**'

permissions:
  contents: write

jobs:
  build-ios-ipa:
    name: Build unsigned IPA for sideloading
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "cmake;3.22.1"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate platform files
        run: flutter create . --platforms=ios,android --project-name facai --org com.guoyaojun

      - name: Configure Android SDK level
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            perl -0pi -e 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 36/g' android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            perl -0pi -e 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 36/g' android/app/build.gradle
          fi
          grep -R "compileSdk" android/app

      - name: Remove generated template tests
        run: rm -f test/widget_test.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        id: flutter_tests
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test --reporter expanded 2>&1 | tee flutter-test.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-log
          path: flutter-test.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Summarize test failure
        if: steps.flutter_tests.outcome == 'failure'
        run: |
          echo "::warning title=Flutter tests failed::Tests failed, but IPA packaging will continue. Download flutter-test-log for details."
          echo "::group::Flutter test log tail"
          tail -80 flutter-test.log
          echo "::endgroup::"
          {
            echo "### Flutter test failure"
            echo
            echo '```text'
            tail -80 flutter-test.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build iOS app without signing
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign 2>&1 | tee flutter-ios-build.log

      - name: Upload iOS build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-build-log
          path: flutter-ios-build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Summarize iOS build failure
        if: failure()
        run: |
          while IFS= read -r line; do
            line="${line//'%'/'%25'}"
            line="${line//$'\n'/'%0A'}"
            line="${line//$'\r'/'%0D'}"
            echo "::error title=iOS build log::$line"
          done < <(tail -80 flutter-ios-build.log)
          echo "::group::Flutter iOS build log tail"
          tail -120 flutter-ios-build.log
          echo "::endgroup::"
          {
            echo "### Flutter iOS build failure"
            echo
            echo '```text'
            tail -120 flutter-ios-build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          mkdir -p build/ios/ipa_unsigned/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa_unsigned/Payload/
          cd build/ios/ipa_unsigned
          test -f Payload/Runner.app/Info.plist
          test -f Payload/Runner.app/Runner
          rm -f Facai.ipa
          ditto -c -k --sequesterRsrc --keepParent Payload Facai.ipa
          unzip -l Facai.ipa | tee ipa-contents.txt
          grep -q 'Payload/Runner.app/Info.plist' ipa-contents.txt
          grep -q 'Payload/Runner.app/Runner' ipa-contents.txt

      - name: Upload IPA structure log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-structure-log
          path: build/ios/ipa_unsigned/ipa-contents.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Facai-unsigned-ipa
          path: build/ios/ipa_unsigned/Facai.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Build Android APK
        run: |
          set +e
          {
            echo "=== Android Gradle config ==="
            grep -R "compileSdk\\|targetSdk\\|minSdk" android/app || true
            echo "=== Flutter build apk ==="
          } | tee flutter-android-build.log
          flutter build apk --release 2>&1 | tee -a flutter-android-build.log
          build_status=${PIPESTATUS[0]}
          if [ "$build_status" -ne 0 ]; then
            {
              echo
              echo "=== Gradle stacktrace retry ==="
            } | tee -a flutter-android-build.log
            (cd android && ./gradlew app:assembleRelease --stacktrace --info) 2>&1 | tee -a ../flutter-android-build.log
            exit "$build_status"
          fi
          mkdir -p build/android/apk
          cp build/app/outputs/flutter-apk/app-release.apk build/android/apk/Facai.apk
          test -f build/android/apk/Facai.apk

      - name: Upload Android build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-build-log
          path: flutter-android-build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Summarize Android build failure
        if: failure()
        run: |
          if [ -f flutter-android-build.log ]; then
            while IFS= read -r line; do
              line="${line//'%'/'%25'}"
              line="${line//$'\n'/'%0A'}"
              line="${line//$'\r'/'%0D'}"
              echo "::error title=Android build log::$line"
            done < <(tail -80 flutter-android-build.log)
            echo "::group::Flutter Android build log tail"
            tail -120 flutter-android-build.log
            echo "::endgroup::"
            {
              echo "### Flutter Android build failure"
              echo
              echo '```text'
              tail -120 flutter-android-build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Facai-android-apk
          path: build/android/apk/Facai.apk
          if-no-files-found: error
          retention-days: 14

      - name: Commit installers to repository
        run: |
          set -euo pipefail
          mkdir -p dist
          cp build/ios/ipa_unsigned/Facai.ipa dist/Facai.ipa
          cp build/android/apk/Facai.apk dist/Facai.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/Facai.ipa dist/Facai.apk
          if git diff --cached --quiet; then
            echo "Installers are unchanged."
          else
            git commit -m "Add generated Facai installers [skip ci]"
            git push
          fi
